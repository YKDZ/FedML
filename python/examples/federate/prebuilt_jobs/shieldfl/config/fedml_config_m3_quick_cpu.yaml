common_args:
  training_type: "cross_silo"
  random_seed: 0

data_args:
  dataset: "cifar10"
  data_cache_dir: /opt/dev/FedML/data
  partition_method: "hetero"
  partition_alpha: 0.5
  server_val_size: 32
  server_trust_size: 32
  client_pool_max_size: 256
  max_samples_per_client: 64
  test_subset_size: 128
  num_workers: 0

model_args:
  model: "ResNet18"

train_args:
  federated_optimizer: "FedAvg"
  client_id_list:
  client_num_in_total: 2
  client_num_per_round: 2
  comm_round: 1
  epochs: 1
  batch_size: 8
  client_optimizer: sgd
  learning_rate: 0.01
  weight_decay: 0.0
  momentum: 0.9
  server_momentum: 0.9
  server_lr: 0.3
  pop_size: 8
  generations: 5
  lambda_reg: 0.01
  cpu_transfer: true
  attack_type: "byzantine"
  attack_mode: "flip"
  byzantine_client_num: 1

validation_args:
  frequency_of_the_test: 1

device_args:
  worker_num: 2
  using_gpu: false
  gpu_mapping_file: config/gpu_mapping.yaml
  gpu_mapping_key: mapping_default

comm_args:
  backend: "MPI"
  is_mobile: 0

tracking_args:
  log_file_dir: ./log
  enable_wandb: false
  using_mlops: false

shieldfl_args:
  runtime_mode: "cpu-fidelity"
  enforce_determinism: true
  aggregator_type: "verifl"
  enable_attack: true
  defense_type: "none"
  eval_asr: false
  result_dir: ./results
