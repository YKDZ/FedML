# M1: 基线可信 — LeNet5 + MNIST, FedAvg, 无攻击无防御
common_args:
  training_type: "cross_silo"
  random_seed: 0

data_args:
  dataset: "mnist"
  data_cache_dir: ./data
  partition_method: "hetero"
  partition_alpha: 0.5
  val_per_class: 50
  trust_per_class: 50
  max_samples_per_client: 300
  test_subset_size: 500
  num_workers: 0

model_args:
  model: "LeNet5"

train_args:
  federated_optimizer: "FedAvg"
  client_id_list:
  client_num_in_total: 3
  client_num_per_round: 3
  comm_round: 3
  epochs: 1
  batch_size: 32
  client_optimizer: sgd
  learning_rate: 0.01
  weight_decay: 0.0
  momentum: 0.9
  cpu_transfer: true
  enable_attack: false
  attack_type: "none"
  enable_defense: false
  defense_type: "none"

validation_args:
  frequency_of_the_test: 1

device_args:
  worker_num: 3
  using_gpu: false
  gpu_mapping_file: config/gpu_mapping.yaml
  gpu_mapping_key: mapping_default

comm_args:
  backend: "MPI"
  is_mobile: 0

tracking_args:
  log_file_dir: ./log
  enable_wandb: false
  using_mlops: false

shieldfl_args:
  runtime_mode: "cpu-deterministic"
  enforce_determinism: true
  sort_client_updates: true
  aggregator_type: "fedavg"
  metrics_output_dir: "./results"
